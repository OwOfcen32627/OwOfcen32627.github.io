<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦕 Dino Runner</title>
    <style>
        body {
            margin: 0; padding: 0; background: #1a1a2e; display: flex;
            justify-content: center; align-items: center; height: 100vh;
            flex-direction: column;
            font-family: monospace;
        }
        canvas {
            border: 2px solid #555;
            background: #f7f7f7;
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }
        #score {
            color: #eee; font-size: 24px; margin-bottom: 10px;
        }
        .back-link {
            color: #ccc; margin-top: 15px; font-size: 14px;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="800" height="300"></canvas>
    <a href="index.html" class="back-link">← 返回主页</a>
    <p>AI游戏，AI代码，AI音乐（好像还损坏了）</p>
       
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('score');

            const groundY = 260;
            let dino = { x: 80, y: groundY - 40, width: 40, height: 40, vy: 0, grounded: true };
            const gravity = 0.9;
            const jumpPower = -14;

            let obstacles = [];
            let frameCount = 0;
            let score = 0;
            let gameSpeed = 25;
            let gameOver = false;
            let musicTriggered = false;
            let nextObstacleAt = 0;

            const musicAudio = new Audio('win.wav');
            musicAudio.preload = 'auto';

            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function scheduleNextObstacle() {
                nextObstacleAt = frameCount + randomInt(55, 95);
            }

            function resetGame() {
                dino.y = groundY - 40;
                dino.vy = 0;
                dino.grounded = true;
                obstacles = [];
                frameCount = 0;
                score = 0;
                gameSpeed = 12;
                gameOver = false;
                musicTriggered = false;
                scoreDisplay.textContent = 'Score: 0';
                scheduleNextObstacle();
            }

            function jump() {
                if (dino.grounded && !gameOver) {
                    dino.vy = jumpPower;
                    dino.grounded = false;
                }
            }

            function generateObstacle() {
                let type = randomInt(0, 2);
                if (type === 0) {
                    let height = randomInt(35, 65);
                    obstacles.push({
                        x: canvas.width,
                        y: groundY - height,
                        width: 22,
                        height: height,
                        hasSpikes: true
                    });
                } else if (type === 1) {
                    let height1 = randomInt(30, 55);
                    let height2 = randomInt(30, 55);
                    obstacles.push({
                        x: canvas.width,
                        y: groundY - height1,
                        width: 20,
                        height: height1,
                        hasSpikes: true
                    });
                    obstacles.push({
                        x: canvas.width + 24,
                        y: groundY - height2,
                        width: 20,
                        height: height2,
                        hasSpikes: true
                    });
                } else {
                    let height = randomInt(25, 40);
                    obstacles.push({
                        x: canvas.width,
                        y: groundY - height - randomInt(30, 50),
                        width: 26,
                        height: height,
                        isFlying: true
                    });
                }
                scheduleNextObstacle();
            }

            function update() {
                if (gameOver) return;

                dino.vy += gravity;
                dino.y += dino.vy;
                if (dino.y >= groundY - dino.height) {
                    dino.y = groundY - dino.height;
                    dino.vy = 0;
                    dino.grounded = true;
                } else {
                    dino.grounded = false;
                }

                if (frameCount >= nextObstacleAt) {
                    generateObstacle();
                }

                for (let obs of obstacles) {
                    obs.x -= gameSpeed;
                }
                obstacles = obstacles.filter(obs => obs.x + obs.width > 0);

                for (let obs of obstacles) {
                    let dinoBottom = dino.y + dino.height;
                    let obsBottom = obs.y + obs.height;
                    if (dino.x < obs.x + obs.width &&
                        dino.x + dino.width > obs.x &&
                        dino.y < obsBottom &&
                        dinoBottom > obs.y) {
                        gameOver = true;
                        break;
                    }
                }

                if (!gameOver) {
                    score += 1;
                    scoreDisplay.textContent = 'Score: ' + score;
                    if (score % 1800 === 0) gameSpeed += 0.4;
                }

                if (!musicTriggered && score >= 32627) {
                    musicTriggered = true;
                    triggerMusic();
                    gameOver = true;
                }

                frameCount++;
            }

            function triggerMusic() {
                musicAudio.play().catch(e => {});
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.beginPath();
                ctx.moveTo(0, groundY);
                ctx.lineTo(canvas.width, groundY);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#2d2d2d';
                ctx.fillRect(dino.x, dino.y, dino.width, dino.height);
                ctx.fillStyle = 'white';
                ctx.fillRect(dino.x + 28, dino.y + 8, 8, 8);
                ctx.fillStyle = 'black';
                ctx.fillRect(dino.x + 32, dino.y + 12, 4, 4);

                for (let obs of obstacles) {
                    if (obs.isFlying) {
                        ctx.fillStyle = '#9b59b6';
                        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                        ctx.fillStyle = '#f1c40f';
                        ctx.fillRect(obs.x - 3, obs.y + 5, 6, 4);
                        ctx.fillRect(obs.x + obs.width - 3, obs.y + 5, 6, 4);
                    } else {
                        ctx.fillStyle = '#c0392b';
                        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                        if (obs.hasSpikes) {
                            ctx.fillStyle = '#2ecc71';
                            ctx.fillRect(obs.x - 3, obs.y + 5, 6, 4);
                            ctx.fillRect(obs.x + obs.width - 3, obs.y + 12, 6, 4);
                        }
                    }
                }

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = 'white';
                    ctx.font = '30px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
                }
            }

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space' || e.code === 'ArrowUp') {
                    e.preventDefault();
                    if (gameOver) {
                        resetGame();
                    } else {
                        jump();
                    }
                    return;
                }

                if (e.ctrlKey && e.shiftKey && e.code === 'KeyK') {
                    e.preventDefault();
                    if (!gameOver) {
                        score = 32000;
                        scoreDisplay.textContent = 'Score: ' + score;
                        obstacles = [];
                        frameCount = 0;
                        gameSpeed = 8;
                        scheduleNextObstacle();
                    }
                }
            });

            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                if (gameOver) resetGame();
                else jump();
            });

            scheduleNextObstacle();
            resetGame();
            gameLoop();
        })();
    </script>
</body>
</html>
