
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 偷看源代码的是小南梁❤❤❤ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亻</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #0a0a0a; color: #ddd;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh;
            background-size: cover; background-position: center;
            background-repeat: no-repeat; background-attachment: fixed;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.55); z-index: 0;
        }
        .container {
            position: relative; z-index: 1;
            text-align: center;
            background: rgba(20,20,30,0.8);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 700px; width: 90%;
        }
        h1 {
            font-size: 2.5rem; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        nav {
            margin-top: 2rem;
            display: flex; flex-wrap: wrap;
            justify-content: center; gap: 1.5rem;
        }
        .btn {
            color: #f0f0f0; text-decoration: none;
            font-size: 1.2rem; padding: 0.6rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 40px;
            transition: all 0.3s;
            background: rgba(255,255,255,0.08);
        }
        .btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.6);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        .hidden-password {
            position: fixed; bottom: 10px; left: 10px;
            color: white; background: white;
            font-size: 14px; padding: 4px 8px;
            opacity: 0.3; user-select: all; cursor: default;
            border-radius: 4px; z-index: 2;
        }
        .hidden-password::selection {
            background: #3399ff; color: white;
        }
        footer {
            margin-top: 2rem; font-size: 0.8rem; color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎来到(插入一个温馨的地名)喵~</h1>
        <p>收录一些发癫、奇怪的项目</p>
        <nav>
            <a href="game.html" class="btn"> AI Dino Runner</a>
            <a href="clipboard.html" class="btn">记录</a>
        </nav>
        <footer>
            <p>© 2026 OwOfcen</p>
        </footer>
    </div>

    

    <script>
        async function setRandomAnimeBg() {
    const apis = [
        //'https://api.waifu.pics/sfw/waifu',               // 主 API
        'https://nekos.best/api/v2/neko',                  // 备用 API (返回格式不同)
        'https://api.waifu.im/search?included_tags=waifu'  // 另一备用
    ];

    let imgUrl = '';

    for (const api of apis) {
        try {
            const resp = await fetch(api);
            if (!resp.ok) continue;
            const data = await resp.json();

            // 解析不同 API 的返回结构
            if (data.url) {
                imgUrl = data.url;
            } else if (data.results && data.results[0] && data.results[0].url) {
                imgUrl = data.results[0].url;   // waifu.im 格式
            } else if (data.images && data.images[0] && data.images[0].url) {
                imgUrl = data.images[0].url;    // nekos.best 格式
            }

            if (imgUrl) break;
        } catch (e) {
            continue;
        }
    }

    
    if (!imgUrl) {
        imgUrl = `https://picsum.photos/1920/1080?random=${Date.now()}`;
    }

    document.body.style.backgroundImage = `url(${imgUrl})`;
}
setRandomAnimeBg();
        setRandomAnimeBg();
    </script>
</body>
</html>
