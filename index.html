<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Final Verification</title>
    <style>
        body { 
            background: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: monospace; 
        }
        input { 
            padding: 12px; 
            font-size: 20px; 
            text-align: center; 
            border: 2px solid #2c6fce; 
            border-radius: 30px; 
            outline: none; 
        }
        button { 
            margin-top: 10px; 
            padding: 10px 30px; 
            font-size: 18px; 
            border: none; 
            border-radius: 30px; 
            background: #2c6fce; 
            color: white; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <div>
        <input type="text" id="pw" placeholder="Password" autocomplete="off">
        <br>
        <button id="btn">Verify</button>
    </div>

    <script>
        const PASSWORD = "COGITOERGOSUM138902184";
        const pw = document.getElementById('pw');
        const btn = document.getElementById('btn');

        btn.onclick = () => {
            if (pw.value.trim().toUpperCase() === PASSWORD) {
                alert("Access Granted\nProject Codename: PHOENIX");
            } else {
                alert("Wrong password");
                pw.value = '';
            }
        };
        pw.addEventListener('keydown', e => {
            if (e.key === 'Enter') btn.click();
        });
    </script>
</body>
</html>
