<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 最终验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        /* 极简容器，只有密码框 */
        .password-box {
            text-align: center;
        }

        .password-box input {
            width: 280px;
            padding: 14px 20px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 4px;
            border: 2px solid #2c6fce;
            border-radius: 40px;
            background: #121826;
            color: #e0e8ff;
            outline: none;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        .password-box input:focus {
            border-color: #4a90d9;
            box-shadow: 0 0 15px rgba(44, 111, 206, 0.5);
        }

        .password-box button {
            margin-top: 20px;
            padding: 12px 32px;
            border: none;
            border-radius: 40px;
            background: #2c6fce;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .password-box button:hover {
            background: #1a529e;
            box-shadow: 0 0 20px rgba(44, 111, 206, 0.7);
            transform: translateY(-2px);
        }

        /* 成功弹窗（隐藏） */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-dialog {
            background: #1a1e2b;
            border: 2px solid #2c6fce;
            border-radius: 16px;
            padding: 30px 25px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            color: #e0e8ff;
            box-shadow: 0 0 40px rgba(44, 111, 206, 0.4);
            animation: fadeSlide 0.3s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-dialog h2 {
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .modal-dialog p {
            font-size: 16px;
            line-height: 1.8;
            margin: 15px 0;
            color: #b0c4de;
        }

        .modal-dialog button {
            padding: 10px 25px;
            border-radius: 25px;
            border: none;
            background: #2c6fce;
            color: white;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.3s;
        }

        .modal-dialog button:hover {
            background: #1a529e;
        }

        /* 错误提示 */
        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="password-box">
        <input type="text" id="passwordInput" placeholder="输入最终密码" maxlength="30" autocomplete="off">
        <br>
        <button id="submitBtn">验证</button>
        <div class="error-message" id="errorMsg">❌ 密码错误，请重试</div>
    </div>

    <!-- 成功弹窗 -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-dialog">
            <h2>🔓 访问已授权</h2>
            <p id="successMessage">
                恭喜你解开了最终谜题。<br>
                项目代号：<strong style="color:#ffd966;">PHOENIX</strong><br>
                实验数据已解锁。
            </p>
            <button onclick="document.getElementById('successModal').classList.remove('active')">关闭</button>
        </div>
    </div>

    <script>
        // ========== 修改这里为你的最终密码 ==========
        const FINAL_PASSWORD = "PHOENIX";

        const passwordInput = document.getElementById('passwordInput');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successModal = document.getElementById('successModal');

        submitBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        function checkPassword() {
            const input = passwordInput.value.trim().toUpperCase();
            if (input === FINAL_PASSWORD) {
                errorMsg.style.display = 'none';
                successModal.classList.add('active');
                passwordInput.value = '';
            } else {
                errorMsg.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        // 关闭弹窗时自动聚焦输入框
        document.getElementById('successModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.remove('active');
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>
