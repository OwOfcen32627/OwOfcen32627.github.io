<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亻尔女子</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #0a0a0a;
            color: #ddd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background-image 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.55);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(20,20,30,0.8);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 700px;
            width: 90%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        nav {
            margin-top: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
        }
        nav a {
            color: #f0f0f0;
            text-decoration: none;
            font-size: 1.2rem;
            padding: 0.6rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 40px;
            transition: all 0.3s;
            background: rgba(255,255,255,0.08);
        }
        nav a:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.6);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        .hidden-password {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: white;
            background: white;
            font-size: 14px;
            padding: 4px 8px;
            opacity: 0.3;
            user-select: all;
            cursor: default;
            border-radius: 4px;
            z-index: 2;
        }
        .hidden-password::selection {
            background: #3399ff;
            color: white;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>亻尔女子,欢迎来到（此处插入一个温馨的地名）</h1>
        <p>这里是一些日常记录、奇怪的项目，以及给集训队同学们准备的小乐趣。</p>
        <nav>
            <a href="blog1.html">雷霆记录</a>
            <a href="blog2.html">小游戏入口</a>
            <a href="game.html"> Dino Runner</a>
        </nav>
        <footer>
            <p>© 2026 OwOfcen</p>
        </footer>
    </div>

    
    <div class="hidden-password" id="secretPassword">
        Password for the video cipher: sakura
        <!-- Decrypt video comment with AES-256-CBC, key=sakura, IV=0123456789abcdef, to get FIRST part -->
    </div>

    <script>
        
        async function setRandomAnimeBg() {
            try {
                const response = await fetch('https://api.waifu.pics/sfw/waifu');
                const data = await response.json();
                if (data && data.url) {
                    document.body.style.backgroundImage = `url(${data.url})`;
                } else {
                    throw new Error('No url');
                }
            } catch (e) {
                
                document.body.style.backgroundImage = 'url("https://picsum.photos/1920/1080")';
            }
        }
        setRandomAnimeBg();
    </script>
</body>
</html>
